<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Solid navy rounded square background so the mark reads on any browser theme -->
  <rect width="32" height="32" rx="6" fill="#0a1628"/>
  <g fill="none" stroke="#00d4ff" stroke-linecap="round">
    <!-- Outer ring (thicker for 16px rendering) -->
    <circle cx="16" cy="16" r="9" stroke-width="2"/>
    <!-- Corner brackets -->
    <path d="M 6 9 L 6 6 L 9 6" stroke-width="2"/>
    <path d="M 23 6 L 26 6 L 26 9" stroke-width="2"/>
    <path d="M 26 23 L 26 26 L 23 26" stroke-width="2"/>
    <path d="M 9 26 L 6 26 L 6 23" stroke-width="2"/>
  </g>
  <!-- Center target dot -->
  <circle cx="16" cy="16" r="2.2" fill="#00d4ff"/>
</svg>
