<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
  <g fill="none" stroke="currentColor" stroke-linecap="round">
    <!-- Background arc (270°, muted) -->
    <path d="M 22.4 77.6 A 35 35 0 1 1 77.6 77.6" stroke-width="3" opacity="0.25"/>
    <!-- Active arc (~200° fill) -->
    <path d="M 22.4 77.6 A 35 35 0 1 1 74.7 22.5" stroke-width="4"/>
    <!-- Tick marks at arc endpoints -->
    <line x1="20" y1="80" x2="25" y2="75" stroke-width="2"/>
    <line x1="80" y1="80" x2="75" y2="75" stroke-width="2"/>
  </g>
  <!-- Center indicator dot -->
  <circle cx="50" cy="50" r="6" fill="currentColor"/>
  <!-- Needle arm pointing to ~70% -->
  <line x1="50" y1="50" x2="74" y2="26" stroke="currentColor" stroke-width="3" stroke-linecap="round"/>
  <!-- Tip dot -->
  <circle cx="74" cy="26" r="3.5" fill="currentColor"/>
</svg>
