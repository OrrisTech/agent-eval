<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" role="img" aria-label="AgentHunter Eval">
  <title>AgentHunter Eval</title>
  <g fill="none" stroke="currentColor" stroke-linecap="round">
    <!-- Outer ring -->
    <circle cx="50" cy="50" r="32" stroke-width="2.5"/>
    <!-- Inner ring (softer) -->
    <circle cx="50" cy="50" r="18" stroke-width="1.5" opacity="0.55"/>
    <!-- Scope corner brackets -->
    <path d="M 12 22 L 12 12 L 22 12" stroke-width="2.5"/>
    <path d="M 78 12 L 88 12 L 88 22" stroke-width="2.5"/>
    <path d="M 88 78 L 88 88 L 78 88" stroke-width="2.5"/>
    <path d="M 22 88 L 12 88 L 12 78" stroke-width="2.5"/>
    <!-- Crosshair ticks at each cardinal -->
    <line x1="50" y1="10" x2="50" y2="20" stroke-width="2"/>
    <line x1="50" y1="80" x2="50" y2="90" stroke-width="2"/>
    <line x1="10" y1="50" x2="20" y2="50" stroke-width="2"/>
    <line x1="80" y1="50" x2="90" y2="50" stroke-width="2"/>
  </g>
  <!-- Center target -->
  <circle cx="50" cy="50" r="4.5" fill="currentColor"/>
</svg>
